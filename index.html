<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamHub</title>
  <link rel="stylesheet" href="styles/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="9" stroke="var(--accent)" stroke-width="1.5"/>
        <polygon points="8,6 15,10 8,14" fill="var(--accent)"/>
      </svg>
      <span class="logo-text">Stream<strong>Hub</strong></span>
    </div>
    <div class="topbar-actions">
      <button class="btn-icon" id="btn-add-url" title="Add stream URL">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Add URL</span>
      </button>
      <label class="btn-icon" for="playlist-upload" title="Upload M3U playlist">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10V2M5 5l3-3 3 3M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Upload M3U</span>
        <input type="file" id="playlist-upload" accept=".m3u,.m3u8" hidden />
      </label>
    </div>
  </header>

  <div id="toast-container"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <input type="search" id="channel-search" placeholder="Search channels…" autocomplete="off" />
          <button class="clear-search" id="clear-search" hidden>x</button>
        </div>
        <div class="category-tabs" id="category-tabs">
          <button class="cat-tab active" data-cat="all">All</button>
          <button class="cat-tab" data-cat="favorites">* Favorites</button>
        </div>
      </div>
      <div class="channel-list-wrap">
        <ul class="channel-list" id="channel-list"></ul>
        <div class="empty-state" id="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="8" width="32" height="24" rx="3" stroke="var(--text-muted)" stroke-width="1.5"/>
            <path d="M14 32l-2 4M26 32l2 4M12 36h16" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <p>No channels yet</p>
          <span>Upload a playlist or add a URL</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <span id="channel-count">0 channels</span>
      </div>
    </aside>

    <main class="player-area">
      <div class="player-container">

        <!-- Clean video element, zero overlays -->
        <div class="video-wrap" id="video-wrap">
          <video id="video-player" playsinline></video>

          <!-- Only shown before any stream is selected -->
          <div class="welcome-overlay" id="welcome-overlay">
            <div class="welcome-inner">
              <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
                <circle cx="26" cy="26" r="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.4"/>
                <circle cx="26" cy="26" r="16" stroke="var(--accent)" stroke-width="1" opacity="0.6"/>
                <polygon points="22,18 36,26 22,34" fill="var(--accent)"/>
              </svg>
              <h2>Ready to stream</h2>
              <p>Upload a playlist or add a stream URL to begin</p>
              <div class="welcome-shortcuts">
                <kbd>Space</kbd> Play / Pause &nbsp;·&nbsp; <kbd>F</kbd> Fullscreen
              </div>
            </div>
          </div>
        </div>

        <!-- Info bar: channel name, status pill, controls -->
        <div class="player-info" id="player-info">
          <div class="now-playing">
            <div class="now-playing-label">NOW PLAYING</div>
            <div class="now-playing-title" id="now-playing-title">-</div>
            <div class="now-playing-group" id="now-playing-group"></div>
          </div>

          <div class="player-status-pill" id="player-status-pill" data-status="idle">
            <span class="status-dot-inline" id="status-dot-inline"></span>
            <span id="status-text-inline"></span>
          </div>

          <div class="player-controls">
            <button class="ctrl-btn" id="btn-fav" title="Toggle favorite">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 2.5L10.85 7.5H16L11.57 10.75L13.43 15.75L9 12.5L4.57 15.75L6.43 10.75L2 7.5H7.15L9 2.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="ctrl-btn" id="btn-retry" title="Retry stream">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M3 9a6 6 0 1 1 1.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M3 13V9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen (F)">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 6V2h4M12 2h4v4M16 12v4h-4M6 16H2v-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" id="url-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">Add Stream URL</h3>
        <button class="modal-close" id="modal-close">x</button>
      </div>
      <div class="modal-body">
        <label for="url-input">Stream URL (M3U8 / direct)</label>
        <input type="url" id="url-input" placeholder="https://example.com/stream.m3u8" autocomplete="off" spellcheck="false" />
        <label for="url-name-input" style="margin-top:12px">Channel name (optional)</label>
        <input type="text" id="url-name-input" placeholder="My Channel" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Play Stream</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="scripts/errorHandler.js"></script>
  <script src="scripts/parser.js"></script>
  <script src="scripts/player.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
